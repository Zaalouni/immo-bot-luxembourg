<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomalies Prix - ImmoLux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script src="dark-mode.js" defer></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ImmoLux">
</head>
<body>
    <div class="header">
        <h1>🎯 Anomalies Prix - ImmoLux</h1>
        <small id="lastUpdate"></small>
        <div style="margin-top: 0.8rem;">
            <a href="index.html" class="nav-link">📊 Dashboard</a>
            <a href="new-listings.html" class="nav-link">⭐ New Offres</a>
            <a href="anomalies.html" class="nav-link active">🎯 Anomalies</a>
            <a href="map-advanced.html" class="nav-link">🗺️ Carte+</a>
            <a href="stats-by-city.html" class="nav-link">📊 Stats Ville</a>
            <a href="photos.html">🖼️ Photos</a>
                <a href="gallery.html">✨ Galerie</a>
        </div>
    </div>

    <div class="container-fluid p-3">
        <!-- Stats -->
        <div class="row g-2 mb-3">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">Total</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="goodDealsCount">0</div>
                    <div class="stat-label">Bon Affaires</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="highPriceCount">0</div>
                    <div class="stat-label">Prix Hauts</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="avgPrice">0€</div>
                    <div class="stat-label">Prix Moyen</div>
                </div>
            </div>
        </div>

        <!-- Filtres -->
        <div class="filters">
            <div class="filter-select">
                <label style="font-weight: 600; display: block; margin-bottom:0.5rem;">Ville:</label>
                <select id="filterCity" class="form-select form-select-sm" style="width:200px;" onchange="applyFilters()">
                    <option value="">Toutes les villes</option>
                </select>
            </div>

            <div class="filter-select">
                <label style="font-weight: 600; display: block; margin-bottom:0.5rem;">Anomalie:</label>
                <select id="filterAnomaly" class="form-select form-select-sm" style="width:200px;" onchange="applyFilters()">
                    <option value="">Toutes</option>
                    <option value="GOOD_DEAL">Bon Affaire (< 0.7x median)</option>
                    <option value="HIGH">Prix Haut (> 2.5x median)</option>
                    <option value="NONE">Prix Normal</option>
                </select>
            </div>
        </div>

        <!-- Listings -->
        <div id="listings"></div>
    </div>

    <!-- ✅ OPTIMISATION: Charger données depuis fichier externe au lieu de les embedder -->
    <script src="data/listings.js"></script>
    <script>
        // Calculer les anomalies à la volée au lieu de les avoir en constant
        function calculateCityStats() {
            const cityGroups = {};

            LISTINGS.forEach(l => {
                const city = l.city || 'N/A';
                if (city === 'N/A') return;

                if (!cityGroups[city]) {
                    cityGroups[city] = [];
                }
                if (l.price && l.price > 0) {
                    cityGroups[city].push(l.price);
                }
            });

            const cityStats = {};
            Object.keys(cityGroups).forEach(city => {
                const prices = cityGroups[city].sort((a, b) => a - b);
                const median = prices[Math.floor(prices.length / 2)];

                cityStats[city] = {
                    median: median,
                    min: Math.min(...prices),
                    max: Math.max(...prices),
                    avg: Math.round(prices.reduce((a, b) => a + b, 0) / prices.length)
                };
            });

            return cityStats;
        }

        function getAnomaly(listing, cityStats) {
            const city = listing.city || 'N/A';
            if (city === 'N/A' || !listing.price || listing.price <= 0) return 'NONE';

            const stats = cityStats[city];
            if (!stats) return 'NONE';

            const ratio = listing.price / stats.median;

            if (ratio < 0.7) return 'GOOD_DEAL';  // Moins de 70% du médian
            if (ratio > 2.5) return 'HIGH';        // Plus de 250% du médian

            return 'NONE';
        }

        let filtered = [];
        let cityStats = {};

        function init() {
            document.getElementById('lastUpdate').textContent = `Mis à jour: ${new Date().toLocaleString('fr-FR')}`;

            // Calculer les stats par ville
            cityStats = calculateCityStats();

            // Calculer les anomalies
            const anomalies = LISTINGS.map(l => getAnomaly(l, cityStats));
            const goodDeals = anomalies.filter(a => a === 'GOOD_DEAL').length;
            const highPrices = anomalies.filter(a => a === 'HIGH').length;

            // Mettre à jour les stats
            const prices = LISTINGS.map(l => l.price).filter(p => p > 0);
            document.getElementById('totalCount').textContent = LISTINGS.length;
            document.getElementById('goodDealsCount').textContent = goodDeals;
            document.getElementById('highPriceCount').textContent = highPrices;
            document.getElementById('avgPrice').textContent = Math.round(prices.reduce((a, b) => a + b, 0) / prices.length) + '€';

            // Remplir les villes
            const cities = [...new Set(LISTINGS.map(l => l.city).filter(c => c && c !== 'N/A'))].sort();
            const citySelect = document.getElementById('filterCity');
            cities.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city;
                opt.textContent = city;
                citySelect.appendChild(opt);
            });

            applyFilters();
        }

        function applyFilters() {
            const city = document.getElementById('filterCity').value;
            const anomaly = document.getElementById('filterAnomaly').value;

            filtered = LISTINGS.filter(l => {
                if (city && l.city !== city) return false;

                const listingAnomaly = getAnomaly(l, cityStats);
                if (anomaly === 'GOOD_DEAL') return listingAnomaly === 'GOOD_DEAL';
                if (anomaly === 'HIGH') return listingAnomaly === 'HIGH';
                if (anomaly === 'NONE') return listingAnomaly === 'NONE';

                return true;
            });

            render();
        }

        function render() {
            const container = document.getElementById('listings');

            if (filtered.length === 0) {
                container.innerHTML = '<div class="alert alert-info">Aucune annonce trouvée</div>';
                return;
            }

            container.innerHTML = filtered.map(l => {
                const anomaly = getAnomaly(l, cityStats);
                const cardClass = anomaly === 'GOOD_DEAL' ? 'good-deal' : anomaly === 'HIGH' ? 'high-price' : '';
                const badgeClass = anomaly === 'GOOD_DEAL' ? 'badge-good' : anomaly === 'HIGH' ? 'badge-high' : '';
                const badgeText = anomaly === 'GOOD_DEAL' ? '✅ Bon Affaire' : anomaly === 'HIGH' ? '⚠️ Prix Haut' : '';

                return `
                    <div class="listing-card ${cardClass}">
                        <h5 style="margin:0 0 0.5rem 0; font-size:1rem;">${l.title || 'Sans titre'}</h5>
                        <div style="font-size:1.3rem; font-weight:700; color:var(--primary); margin-bottom:0.5rem;">${l.price}€</div>

                        <div style="margin-bottom:0.8rem;">
                            <span class="badge bg-secondary">${l.site || 'N/A'}</span>
                            <span class="badge bg-light" style="color:#666;">${l.city || 'N/A'}</span>
                            ${anomaly !== 'NONE' ? `<span class="badge-anomaly ${badgeClass}">${badgeText}</span>` : ''}
                        </div>

                        <small style="color:#888; display:block; margin-bottom:0.8rem;">
                            ${l.surface > 0 ? `${l.surface}m² | ` : ''}
                            ${l.rooms > 0 ? `${l.rooms} ch | ` : ''}
                            ${l.price_m2 > 0 ? `${l.price_m2.toFixed(1)}€/m²` : ''}
                        </small>

                        <a href="${l.url}" target="_blank" class="btn btn-sm btn-primary" style="width:100%;">
                            Voir l'annonce
                        </a>
                    </div>
                `;
            }).join('');
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>

    <!-- Dark Mode Toggle -->
    <button class="dark-mode-toggle" id="darkModeToggle" title="Mode sombre" aria-label="Mode sombre/clair" aria-pressed="false">🌙</button>
<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("SW registered"))
        .catch(err => console.log("SW failed:", err));
}
</script>
</body>
</html>
