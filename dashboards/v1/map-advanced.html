<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Avancée - ImmoLux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
    <link href="https://unpkg.com/leaflet.markercluster@1.5.1/dist/MarkerCluster.css" rel="stylesheet">
    <link href="https://unpkg.com/leaflet.markercluster@1.5.1/dist/MarkerCluster.Default.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ImmoLux">
    <script src="dark-mode.js" defer></script>
</head>
<body>
    <div class="header">
        <h1>🗺️ Carte Avancée - ImmoLux</h1>
        <div>
            <a href="index.html" class="nav-link">📊 Dashboard</a>
            <a href="new-listings.html" class="nav-link">⭐ New Offres</a>
            <a href="anomalies.html" class="nav-link">🎯 Anomalies</a>
            <a href="map-advanced.html" class="nav-link active">🗺️ Carte+</a>
            <a href="stats-by-city.html" class="nav-link">📊 Stats Ville</a>
            <a href="photos.html">🖼️ Photos</a>
                <a href="gallery.html">✨ Galerie</a>
        </div>
    </div>

    <div class="container-map">
        <div class="sidebar">
            <div class="filters">
                <select id="filterCity" class="form-select form-select-sm mb-2">
                    <option value="">Toutes les villes</option>
                </select>
                <select id="filterSite" class="form-select form-select-sm mb-2">
                    <option value="">Tous les sites</option>
                </select>
                <button class="btn btn-sm btn-primary w-100" onclick="applyMapFilters()">Filtrer</button>
            </div>

            <div id="listings" style="height: 100%;"></div>
        </div>

        <div id="map" class="map"></div>
    </div>

    <!-- Dark Mode Toggle -->
    <button class="dark-mode-toggle" id="darkModeToggle" title="Mode sombre">🌙</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.1/dist/leaflet.markercluster.js"></script>
    <script src="data/listings.js"></script>
    <script src="data/anomalies.js"></script>
    <script>
        // Fallback si ANOMALIES n'est pas chargé
        if (typeof ANOMALIES === 'undefined') {
            window.ANOMALIES = {};
        }

        let map;
        let markerClusterGroup;
        let currentMarkers = {};
        let allMarkers = [];

        const ANOMALY_COLORS = {
            'GOOD_DEAL': '#28a745',
            'HIGH': '#dc3545',
            'NORMAL': '#667eea'
        };

        function init() {
            try {
                // LISTINGS est déjà chargé via data/listings.js
                if (!LISTINGS || LISTINGS.length === 0) {
                    throw new Error('LISTINGS non disponible');
                }

                initMap();
                populateFilters();
                renderListings(LISTINGS);
                addMarkersToMap(LISTINGS);
            } catch (e) {
                console.error('Erreur:', e);
                document.getElementById('listings').innerHTML = '<div class="text-danger">Erreur chargement données</div>';
            }
        }

        function initMap() {
            // Centrer sur Luxembourg
            const centerLat = 49.6116;
            const centerLng = 6.1319;

            map = L.map('map').setView([centerLat, centerLng], 10);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            // Clustering
            markerClusterGroup = L.markerClusterGroup({
                maxClusterRadius: 80,
                iconCreateFunction: createClusterIcon
            });
            map.addLayer(markerClusterGroup);
        }

        function createClusterIcon(cluster) {
            const count = cluster.getChildCount();
            const size = count < 10 ? 40 : count < 50 ? 50 : 60;
            return L.divIcon({
                html: `<div style="background:#667eea; color:white; width:${size}px; height:${size}px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.85rem;">${count}</div>`,
                iconSize: [size, size],
                className: ''
            });
        }

        function populateFilters() {
            const cities = [...new Set(LISTINGS.map(l => l.city).filter(c => c))].sort();
            const sites = [...new Set(LISTINGS.map(l => l.site).filter(s => s))].sort();

            const citySelect = document.getElementById('filterCity');
            cities.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city;
                opt.textContent = city;
                citySelect.appendChild(opt);
            });

            const siteSelect = document.getElementById('filterSite');
            sites.forEach(site => {
                const opt = document.createElement('option');
                opt.value = site;
                opt.textContent = site;
                siteSelect.appendChild(opt);
            });
        }

        function applyMapFilters() {
            const city = document.getElementById('filterCity').value;
            const site = document.getElementById('filterSite').value;

            const filtered = LISTINGS.filter(l => {
                return (!city || l.city === city) && (!site || l.site === site);
            });

            // Clear map
            markerClusterGroup.clearLayers();
            document.getElementById('listings').innerHTML = '';
            renderListings(filtered);
            addMarkersToMap(filtered);
        }

        function renderListings(listings) {
            const container = document.getElementById('listings');
            if (listings.length === 0) {
                container.innerHTML = '<div class="text-muted">Aucune annonce</div>';
                return;
            }

            container.innerHTML = listings.map(l => {
                const anomaly = ANOMALIES[l.listing_id] || 'NORMAL';
                const badgeClass = anomaly === 'GOOD_DEAL' ? 'badge-good' : anomaly === 'HIGH' ? 'badge-high' : '';
                const badgeText = anomaly === 'GOOD_DEAL' ? '✅ Bon Affaire' : anomaly === 'HIGH' ? '⚠️ Prix Haut' : '';

                return `
                    <div class="listing-item" onclick="selectListing('${l.listing_id}')">
                        <h6>${l.title}</h6>
                        <div class="listing-item-price">${l.price}€</div>
                        <div class="small">
                            <span class="badge bg-secondary">${l.city}</span>
                            ${anomaly !== 'NORMAL' ? `<span class="badge-anomaly ${badgeClass}">${badgeText}</span>` : ''}
                        </div>
                        <div class="small text-muted mt-1">
                            ${l.surface > 0 ? `${l.surface}m² | ` : ''}
                            ${l.rooms > 0 ? `${l.rooms} ch | ` : ''}
                            ${l.time_ago}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addMarkersToMap(listings) {
            currentMarkers = {};

            listings.forEach(listing => {
                if (!listing.latitude || !listing.longitude) return;

                const anomaly = ANOMALIES[listing.listing_id] || 'NORMAL';
                const color = ANOMALY_COLORS[anomaly];

                const marker = L.circleMarker([listing.latitude, listing.longitude], {
                    radius: 8,
                    fillColor: color,
                    color: '#fff',
                    weight: 2,
                    opacity: 0.8,
                    fillOpacity: 0.7
                }).bindPopup(`
                    <strong>${listing.title}</strong><br/>
                    <strong>${listing.price}€</strong><br/>
                    ${listing.surface > 0 ? listing.surface + 'm² | ' : ''}
                    ${listing.rooms > 0 ? listing.rooms + ' ch' : ''}<br/>
                    <small>${listing.city}</small><br/>
                    <a href="${listing.url}" target="_blank" class="btn btn-sm btn-primary mt-2">Voir</a>
                `);

                marker.on('click', () => selectListing(listing.listing_id));
                markerClusterGroup.addLayer(marker);
                currentMarkers[listing.listing_id] = marker;
            });
        }

        function selectListing(listingId) {
            // Highlight item in sidebar
            document.querySelectorAll('.listing-item').forEach(el => el.classList.remove('active'));
            const items = document.querySelectorAll('.listing-item');
            const listing = LISTINGS.find(l => l.listing_id === listingId);
            if (listing) {
                items.forEach(el => {
                    if (el.textContent.includes(listing.title)) {
                        el.classList.add('active');
                        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                });
            }

            // Center map on marker
            const marker = currentMarkers[listingId];
            if (marker) {
                map.setView(marker.getLatLng(), 14);
                marker.openPopup();
            }
        }

        // ==================== DARK MODE ====================
        const darkModeToggle = document.getElementById('darkModeToggle');
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        });

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("SW registered"))
        .catch(err => console.log("SW failed:", err));
}
</script>
</body>
</html>
