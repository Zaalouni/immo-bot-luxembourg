<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Villes prioritaires - ImmoLux">
    <meta name="theme-color" content="#f59e0b">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>⭐ Villes Prioritaires - ImmoLux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script src="dark-mode.js" defer></script>
    <script src="data/version.js"></script>
    <script src="version-display.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #92400e 0%, #b45309 50%, #d97706 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1207 0%, #2d1f06 50%, #3d2a08 100%);
        }

        .container-modern {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── Header ── */
        .header-modern {
            text-align: center;
            color: white;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.6s ease;
        }

        .header-modern h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .header-modern .header-meta {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            opacity: 0.92;
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        /* ── Stat cards ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease 0.1s both;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.75rem;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(90deg, #f59e0b, #d97706);
        }

        body.dark-mode .stat-card {
            background: rgba(40, 25, 5, 0.9);
            color: white;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(0,0,0,0.18);
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #d97706;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.4rem;
        }

        body.dark-mode .stat-value { color: #fbbf24; }

        .stat-label {
            font-size: 0.9rem;
            color: #6b7280;
            font-weight: 500;
        }

        body.dark-mode .stat-label { color: #9ca3af; }

        /* ── Glass panels ── */
        .glass-panel {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        body.dark-mode .glass-panel {
            background: rgba(40, 25, 5, 0.9);
            color: white;
        }

        /* ── Priority badges ── */
        .priority-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(245,158,11,0.3);
        }

        /* ── Sort buttons ── */
        .sort-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 0.5rem 1.1rem;
            border-radius: 12px;
            border: 2px solid rgba(245,158,11,0.3);
            background: rgba(245,158,11,0.08);
            color: #92400e;
            font-size: 0.87rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .sort-btn:hover {
            background: rgba(245,158,11,0.15);
            border-color: #f59e0b;
            transform: translateY(-2px);
        }

        .sort-btn.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(245,158,11,0.35);
        }

        body.dark-mode .sort-btn {
            background: rgba(245,158,11,0.1);
            border-color: rgba(245,158,11,0.25);
            color: #fbbf24;
        }

        body.dark-mode .sort-btn.active {
            background: linear-gradient(135deg, #d97706, #b45309);
            color: white;
        }

        /* ── City section ── */
        .city-section { margin-bottom: 2rem; }

        .city-header {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            padding: 0.9rem 1.25rem;
            border-radius: 16px;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 16px rgba(245,158,11,0.3);
            position: sticky;
            top: 10px;
            z-index: 10;
        }

        body.dark-mode .city-header {
            background: linear-gradient(135deg, #b45309 0%, #92400e 100%);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        /* ── Listing rows ── */
        .listing-row {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            border-left: 4px solid #f59e0b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            transition: all 0.3s ease;
        }

        .listing-row:hover {
            transform: translateX(4px);
            box-shadow: 0 6px 24px rgba(245,158,11,0.2);
        }

        body.dark-mode .listing-row {
            background: rgba(40, 25, 5, 0.9);
            border-left-color: #d97706;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            color: white;
        }

        .listing-info { display: flex; align-items: center; gap: 1.2rem; flex: 1; flex-wrap: wrap; }

        .info-chip {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .chip-label { font-size: 0.65rem; color: #9ca3af; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
        .chip-value { font-size: 0.95rem; font-weight: 600; color: #1f2937; }
        body.dark-mode .chip-value { color: #f3f4f6; }
        .chip-price { color: #d97706; font-size: 1.1rem; }

        /* ── Site chip ── */
        .site-chip {
            background: rgba(245,158,11,0.12);
            color: #92400e;
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 600;
            border: 1px solid rgba(245,158,11,0.2);
        }

        body.dark-mode .site-chip {
            background: rgba(245,158,11,0.15);
            color: #fbbf24;
            border-color: rgba(245,158,11,0.25);
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: white;
            opacity: 0.8;
        }

        /* ── Select ── */
        select {
            border: 2px solid rgba(245,158,11,0.3);
            border-radius: 12px;
            padding: 0.45rem 0.9rem;
            font-size: 0.87rem;
            background: rgba(255,255,255,0.95);
            color: #92400e;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        select:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }

        body.dark-mode select {
            background: rgba(40,25,5,0.9);
            color: #fbbf24;
            border-color: rgba(245,158,11,0.25);
        }

        /* ── Back link ── */
        .back-link {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 0.6rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.25s ease;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.25);
            color: white;
            transform: translateY(-2px);
        }

        /* ── Animations ── */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header-modern">
    <h1>⭐ Villes Prioritaires</h1>
    <div class="header-meta">
        <span>📅 <span id="lastUpdate">Chargement...</span></span>
        <span>📊 <strong id="totalCount">—</strong> annonces</span>
        <span>🏙️ <strong id="cityCount">—</strong> villes</span>
        <span>💰 <strong id="avgPrice">—</strong> moy.</span>
    </div>
</div>

<div class="container-modern">

    <!-- Stats rapides -->
    <div class="stats-grid" id="quickStats" style="margin-bottom:1.5rem;"></div>

    <!-- Villes badges -->
    <div class="glass-panel">
        <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;">
            <span style="font-weight:700;color:#92400e;font-size:0.95rem;">⭐ Villes surveillées :</span>
            <span id="cityBadges"></span>
        </div>
    </div>

    <!-- Tri + Filtre ville -->
    <div class="glass-panel" style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
        <div class="sort-controls">
            <button class="sort-btn active" onclick="setSort('date')">📅 Date</button>
            <button class="sort-btn" onclick="setSort('price_asc')">💰 Prix ↑</button>
            <button class="sort-btn" onclick="setSort('price_desc')">💰 Prix ↓</button>
            <button class="sort-btn" onclick="setSort('surface')">📐 Surface</button>
        </div>
        <select id="filterCity" onchange="render()">
            <option value="">Toutes les villes</option>
        </select>
    </div>

    <!-- Annonces -->
    <div id="listingsContainer"></div>

    <!-- Retour -->
    <div style="text-align:center;margin-top:2rem;padding-bottom:2rem;">
        <a href="index.html" class="back-link">← Retour dashboard</a>
    </div>
</div>

<!-- Dark Mode Toggle -->
<button class="dark-mode-toggle" id="darkModeToggle" title="Mode sombre" aria-label="Mode sombre/clair" aria-pressed="false">🌙</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
<script src="data/listings.js"></script>
<script>
    // Dark mode
    const dmToggle = document.getElementById('darkModeToggle');
    dmToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        dmToggle.setAttribute('aria-pressed', document.body.classList.contains('dark-mode'));
    });
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        dmToggle.setAttribute('aria-pressed', 'true');
    }

    const fmt = n => n ? n.toLocaleString('fr-FR') : '—';

    let currentSort = 'date';

    function setSort(s) {
        currentSort = s;
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        render();
    }

    function init() {
        if (!LISTINGS || !Array.isArray(LISTINGS)) return;

        const PC = (typeof PRIORITY_CITIES !== 'undefined') ? PRIORITY_CITIES : [];

        // Afficher les badges des villes prioritaires
        document.getElementById('cityBadges').innerHTML = PC.map(c =>
            `<span class="priority-badge">${c}</span>`
        ).join(' ');

        // Peupler filtre ville
        const citySelect = document.getElementById('filterCity');
        PC.forEach(c => {
            const count = LISTINGS.filter(l => (typeof normCity !== 'undefined' ? normCity(l.city) : l.city) === c).length;
            if (count > 0) {
                const o = document.createElement('option');
                o.value = c;
                o.textContent = `${c} (${count})`;
                citySelect.appendChild(o);
            }
        });

        render();
    }

    function getFiltered() {
        const PC = (typeof PRIORITY_CITIES !== 'undefined') ? PRIORITY_CITIES : [];
        const nc = (typeof normCity !== 'undefined') ? normCity : c => c;
        const filterCity = document.getElementById('filterCity').value;

        let items = LISTINGS.filter(l => {
            const city = nc(l.city || '');
            return PC.includes(city) && (filterCity === '' || city === filterCity);
        });

        // Tri
        if (currentSort === 'date') {
            items = items.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
        } else if (currentSort === 'price_asc') {
            items = items.sort((a, b) => (a.price || 0) - (b.price || 0));
        } else if (currentSort === 'price_desc') {
            items = items.sort((a, b) => (b.price || 0) - (a.price || 0));
        } else if (currentSort === 'surface') {
            items = items.sort((a, b) => (b.surface || 0) - (a.surface || 0));
        }
        return items;
    }

    function render() {
        const PC = (typeof PRIORITY_CITIES !== 'undefined') ? PRIORITY_CITIES : [];
        const nc = (typeof normCity !== 'undefined') ? normCity : c => c;
        const items = getFiltered();
        const container = document.getElementById('listingsContainer');

        // Stats rapides
        const prices = items.filter(l => l.price > 0).map(l => l.price);
        const avg = prices.length ? Math.round(prices.reduce((a,b) => a+b,0) / prices.length) : 0;
        const mn = prices.length ? Math.min(...prices) : 0;
        const mx = prices.length ? Math.max(...prices) : 0;
        const citiesPresent = [...new Set(items.map(l => nc(l.city)))];

        document.getElementById('totalCount').textContent = items.length;
        document.getElementById('cityCount').textContent = citiesPresent.length;
        document.getElementById('avgPrice').textContent = avg ? fmt(avg) + '€' : '—';

        document.getElementById('quickStats').innerHTML = [
            { label: 'Annonces', value: items.length, icon: '📊' },
            { label: 'Villes actives', value: citiesPresent.length + ' / ' + PC.length, icon: '🏙️' },
            { label: 'Prix moyen', value: avg ? fmt(avg) + '€' : '—', icon: '💰' },
            { label: 'Min — Max', value: mn ? fmt(mn) + '€ — ' + fmt(mx) + '€' : '—', icon: '📉' },
        ].map(s => `
            <div class="stat-card stat-card-gold">
                <div class="stat-value" style="font-size:1.2rem;">${s.value}</div>
                <div class="stat-label">${s.icon} ${s.label}</div>
            </div>
        `).join('');

        if (!items.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div style="font-size:3rem;">🏠</div>
                    <h4>Aucune annonce trouvée</h4>
                    <p>Aucune annonce dans les villes prioritaires pour le moment.</p>
                </div>`;
            return;
        }

        // Grouper par ville si pas de filtre actif, sinon liste directe
        const filterCity = document.getElementById('filterCity').value;
        if (filterCity) {
            // Vue liste simple
            container.innerHTML = `<div class="city-section">${items.map(l => listingRow(l, nc)).join('')}</div>`;
        } else {
            // Vue groupée par ville
            const groups = {};
            PC.forEach(c => { groups[c] = []; });
            items.forEach(l => {
                const c = nc(l.city || '');
                if (groups[c] !== undefined) groups[c].push(l);
            });

            container.innerHTML = PC.map(city => {
                const cityItems = groups[city] || [];
                if (!cityItems.length) return '';
                const cityPrices = cityItems.filter(l => l.price > 0).map(l => l.price);
                const cityAvg = cityPrices.length ? Math.round(cityPrices.reduce((a,b)=>a+b,0)/cityPrices.length) : 0;
                return `
                    <div class="city-section">
                        <div class="city-header">
                            <span style="font-weight:700;font-size:1rem;">⭐ ${city}
                                <span class="priority-badge ms-2">${cityItems.length} annonce${cityItems.length > 1 ? 's' : ''}</span>
                            </span>
                            ${cityAvg ? `<span style="color:#92400e;font-size:0.9rem;">Moy. <strong>${fmt(cityAvg)}€</strong></span>` : ''}
                        </div>
                        ${cityItems.map(l => listingRow(l, nc)).join('')}
                    </div>
                `;
            }).join('');
        }
    }

    function listingRow(l, nc) {
        const createdAt = l.created_at ? new Date(l.created_at) : null;
        const dateStr = createdAt ? createdAt.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'2-digit' }) : '—';
        const timeStr = createdAt ? createdAt.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }) : '';
        const ageHours = createdAt ? Math.round((Date.now() - createdAt.getTime()) / 3600000) : null;
        const isRecent = ageHours !== null && ageHours < 24;

        return `
            <div class="listing-row">
                <div class="listing-info">
                    <div class="info-chip">
                        <span class="chip-label">📍 Ville</span>
                        <span class="chip-value">⭐ ${nc(l.city) || '—'}</span>
                    </div>
                    <div class="info-chip">
                        <span class="chip-label">💰 Prix</span>
                        <span class="chip-value chip-price">${l.price ? fmt(l.price) + '€' : '—'}</span>
                    </div>
                    <div class="info-chip">
                        <span class="chip-label">📐 Surface</span>
                        <span class="chip-value">${l.surface ? l.surface + ' m²' : '—'}</span>
                    </div>
                    <div class="info-chip">
                        <span class="chip-label">🛏️ Ch.</span>
                        <span class="chip-value">${l.rooms || '—'}</span>
                    </div>
                    ${l.price_m2 ? `<div class="info-chip">
                        <span class="chip-label">€/m²</span>
                        <span class="chip-value">${l.price_m2}</span>
                    </div>` : ''}
                    ${l.distance_km != null ? `<div class="info-chip">
                        <span class="chip-label">📏 Dist.</span>
                        <span class="chip-value">${l.distance_km} km</span>
                    </div>` : ''}
                    <span class="site-chip">${(l.site || '').replace('.lu','')}</span>
                    ${isRecent ? '<span class="badge bg-warning text-dark" style="font-size:0.65rem;">🆕 Nouveau</span>' : ''}
                </div>
                <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0;">
                    <span style="font-size:0.75rem;color:#9ca3af;text-align:right;">${dateStr}<br>${timeStr}</span>
                    <a href="${l.url}" target="_blank" class="btn btn-sm" style="background:#f59e0b;color:white;white-space:nowrap;">Voir →</a>
                </div>
            </div>
        `;
    }

    // Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Init après chargement
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
