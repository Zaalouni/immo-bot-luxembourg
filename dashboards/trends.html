<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <title>Tendances - ImmoLux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="dark-mode.js" defer></script>
    <script src="data/version.js"></script>
    <script src="version-display.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .container-modern {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header-modern {
            text-align: center;
            color: white;
            margin-bottom: 3rem;
            animation: fadeInDown 0.6s ease;
        }

        .header-modern h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 20px rgba(0,0,0,0.2);
        }

        .header-modern p {
            font-size: 1.2rem;
            opacity: 0.95;
            font-weight: 500;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease 0.2s both;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark-mode .stat-card {
            background: rgba(30, 30, 50, 0.9);
            color: white;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(0,0,0,0.15);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            font-family: 'JetBrains Mono', monospace;
        }

        body.dark-mode .stat-value {
            color: #8b9cff;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
            margin-top: 0.25rem;
        }

        body.dark-mode .stat-label {
            color: #aaa;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease both;
        }

        .chart-card:nth-child(1) { animation-delay: 0.1s; }
        .chart-card:nth-child(2) { animation-delay: 0.2s; }
        .chart-card:nth-child(3) { animation-delay: 0.3s; }

        body.dark-mode .chart-card {
            background: rgba(30, 30, 50, 0.9);
            color: white;
        }

        .chart-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .chart-card:hover::before {
            transform: scaleX(1);
        }

        .chart-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 48px rgba(102, 126, 234, 0.2);
        }

        .chart-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        body.dark-mode .chart-title {
            color: white;
        }

        .chart-icon {
            font-size: 1.8rem;
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .loading-spinner {
            text-align: center;
            padding: 2rem;
            color: #667eea;
            font-size: 1.2rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2.5rem;
            background: rgba(255, 255, 255, 0.95);
            color: #667eea;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        body.dark-mode .btn-back {
            background: rgba(30, 30, 50, 0.9);
            color: #8b9cff;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            color: #764ba2;
        }

        .dark-mode-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        body.dark-mode .dark-mode-toggle {
            background: rgba(30, 30, 50, 0.9);
        }

        .dark-mode-toggle:hover {
            transform: scale(1.1) rotate(20deg);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner::before {
            content: '⏳';
            display: inline-block;
            animation: spin 2s linear infinite;
        }

        @media (max-width: 768px) {
            .header-modern h1 {
                font-size: 2rem;
            }

            .stats-overview {
                grid-template-columns: repeat(2, 1fr);
            }

            .chart-container {
                height: 300px;
            }

            .chart-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container-modern">
        <div class="header-modern">
            <h1>📈 Tendances du Marché</h1>
            <p>Évolution des prix et volumes immobiliers</p>
        </div>

        <div class="stats-overview" id="statsCards">
            <div class="stat-card">
                <div class="stat-icon">🏠</div>
                <div class="stat-value" id="totalListings">0</div>
                <div class="stat-label">Annonces Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏙️</div>
                <div class="stat-value" id="totalCities">0</div>
                <div class="stat-label">Villes</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="avgPrice">0€</div>
                <div class="stat-label">Prix Moyen</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-value" id="historyDays">0</div>
                <div class="stat-label">Jours d'Historique</div>
            </div>
        </div>

        <div class="chart-card">
            <h3 class="chart-title">
                <span class="chart-icon">📊</span>
                Prix Moyen par Ville (Top 5)
            </h3>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="chart-card" id="historyChartCard" style="display: none;">
            <h3 class="chart-title">
                <span class="chart-icon">📉</span>
                Évolution sur 7 Jours
            </h3>
            <div class="chart-container">
                <canvas id="historyChart"></canvas>
            </div>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="index.html" class="btn-back">
                <span>←</span>
                <span>Retour au Dashboard</span>
            </a>
        </div>
    </div>

    <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Mode sombre/clair">🌙</button>

    <script src="data/listings.js"></script>
    <script>
        // Dark mode
        const dm = document.getElementById("darkModeToggle");
        dm.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            dm.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
            localStorage.setItem("darkMode", document.body.classList.contains("dark-mode"));
            updateChartColors();
        });
        if(localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark-mode");
            dm.textContent = "☀️";
        }

        let priceChart = null;
        let historyChart = null;

        function getChartColors() {
            const isDark = document.body.classList.contains("dark-mode");
            return {
                textColor: isDark ? '#e2e8f0' : '#2d3748',
                gridColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
            };
        }

        function updateChartColors() {
            const colors = getChartColors();

            if (priceChart) {
                priceChart.options.scales.x.ticks.color = colors.textColor;
                priceChart.options.scales.y.ticks.color = colors.textColor;
                priceChart.options.scales.x.grid.color = colors.gridColor;
                priceChart.options.scales.y.grid.color = colors.gridColor;
                priceChart.options.plugins.legend.labels.color = colors.textColor;
                priceChart.update();
            }

            if (historyChart) {
                historyChart.options.scales.x.ticks.color = colors.textColor;
                historyChart.options.scales.y.ticks.color = colors.textColor;
                historyChart.options.scales.y1.ticks.color = colors.textColor;
                historyChart.options.scales.x.grid.color = colors.gridColor;
                historyChart.options.scales.y.grid.color = colors.gridColor;
                historyChart.options.plugins.legend.labels.color = colors.textColor;
                historyChart.update();
            }
        }

        async function loadHistory() {
            const today = new Date();
            const history = [];

            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                try {
                    const response = await fetch(`data/history/${dateStr}.json`);
                    if (response.ok) {
                        const data = await response.json();
                        history.push({
                            date: dateStr,
                            total: data.stats?.total || 0,
                            avg_price: data.stats?.avg_price || 0
                        });
                    }
                } catch (e) {
                    // Fichier non trouvé
                }
            }
            return history;
        }

        function updateStats(cityPrices, historyLength) {
            const total = LISTINGS.length;
            const prices = LISTINGS.filter(l => l.price > 0).map(l => l.price);
            const avgPrice = prices.length ? Math.round(prices.reduce((a,b) => a+b) / prices.length) : 0;
            const cities = Object.keys(cityPrices).length;

            document.getElementById('totalListings').textContent = total.toLocaleString();
            document.getElementById('totalCities').textContent = cities;
            document.getElementById('avgPrice').textContent = avgPrice.toLocaleString() + '€';
            document.getElementById('historyDays').textContent = historyLength;
        }

        async function init() {
            if(!LISTINGS || LISTINGS.length === 0) {
                document.getElementById('statsCards').innerHTML = '<p class="loading-spinner">Aucune donnée disponible</p>';
                return;
            }

            const colors = getChartColors();

            // Calculer prix par ville
            const cityPrices = {};
            LISTINGS.forEach(l => {
                if(!cityPrices[l.city]) cityPrices[l.city] = [];
                if(l.price > 0) cityPrices[l.city].push(l.price);
            });

            const topCities = Object.entries(cityPrices)
                .map(([city, prices]) => [city, Math.round(prices.reduce((a,b) => a+b, 0) / prices.length)])
                .sort((a,b) => b[1] - a[1])
                .slice(0, 5);

            // Graphique prix par ville
            const ctx = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: topCities.map(c => c[0]),
                    datasets: [{
                        label: 'Prix Moyen (€)',
                        data: topCities.map(c => c[1]),
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(118, 75, 162, 0.8)',
                            'rgba(139, 156, 255, 0.8)',
                            'rgba(90, 111, 214, 0.8)',
                            'rgba(54, 162, 235, 0.8)'
                        ],
                        borderColor: [
                            '#667eea',
                            '#764ba2',
                            '#8b9cff',
                            '#5a6fd6',
                            '#36a2eb'
                        ],
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            labels: { color: colors.textColor, font: { size: 14, weight: '600' } }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            padding: 12,
                            titleFont: { size: 14, weight: '600' },
                            bodyFont: { size: 13 },
                            cornerRadius: 8
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: colors.textColor, font: { size: 12, weight: '500' } },
                            grid: { color: colors.gridColor }
                        },
                        y: {
                            ticks: { color: colors.textColor, font: { size: 12 } },
                            grid: { color: colors.gridColor }
                        }
                    }
                }
            });

            // Charger historique
            const history = await loadHistory();
            updateStats(cityPrices, history.length);

            if (history.length > 1) {
                document.getElementById('historyChartCard').style.display = 'block';

                const ctxHist = document.getElementById('historyChart').getContext('2d');
                historyChart = new Chart(ctxHist, {
                    type: 'line',
                    data: {
                        labels: history.map(h => {
                            const [y, m, d] = h.date.split('-');
                            return `${d}/${m}`;
                        }),
                        datasets: [{
                            label: 'Nombre d\'annonces',
                            data: history.map(h => h.total),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            fill: true,
                            tension: 0.4,
                            borderWidth: 3,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            pointBackgroundColor: '#667eea'
                        }, {
                            label: 'Prix moyen (€)',
                            data: history.map(h => h.avg_price),
                            borderColor: '#28a745',
                            backgroundColor: 'rgba(40, 167, 69, 0.1)',
                            fill: true,
                            tension: 0.4,
                            borderWidth: 3,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            pointBackgroundColor: '#28a745',
                            yAxisID: 'y1'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: true,
                                labels: { color: colors.textColor, font: { size: 14, weight: '600' } }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0,0,0,0.8)',
                                padding: 12,
                                titleFont: { size: 14, weight: '600' },
                                bodyFont: { size: 13 },
                                cornerRadius: 8
                            }
                        },
                        scales: {
                            x: {
                                ticks: { color: colors.textColor, font: { size: 12 } },
                                grid: { color: colors.gridColor }
                            },
                            y: {
                                position: 'left',
                                title: { display: true, text: 'Annonces', color: colors.textColor, font: { size: 13, weight: '600' } },
                                ticks: { color: colors.textColor, font: { size: 12 } },
                                grid: { color: colors.gridColor }
                            },
                            y1: {
                                position: 'right',
                                title: { display: true, text: 'Prix (€)', color: colors.textColor, font: { size: 13, weight: '600' } },
                                ticks: { color: colors.textColor, font: { size: 12 } },
                                grid: { drawOnChartArea: false }
                            }
                        }
                    }
                });
            }
        }

        init();
    </script>

    <!-- Service Worker -->
    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js")
            .then(reg => console.log("SW registered"))
            .catch(err => console.log("SW failed:", err));
    }
    </script>
</body>
</html>
