<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <title>Tendances - ImmoLux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dark-mode.js" defer></script>
</head>
<body>
    <div class="header">
        <h1>📈 Tendances du Marché</h1>
        <p style="margin: 0; opacity: 0.9;">Évolution des prix et volumes</p>
    </div>

    <div class="container-main">
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>

        <div style="background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;">
            <h3 style="color: var(--primary); margin-bottom: 1rem;">📊 Statistiques Globales</h3>
            <div id="stats"></div>
        </div>

        <div style="text-align: center;">
            <a href="index.html" class="btn btn-primary">← Retour</a>
        </div>
    </div>

    <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Mode sombre/clair" aria-pressed="false">🌙</button>

    <script src="data/listings.js"></script>
    <script>
        const dm = document.getElementById("darkModeToggle");
        dm.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("darkMode", document.body.classList.contains("dark-mode"));
        });
        if(localStorage.getItem("darkMode") === "true") document.body.classList.add("dark-mode");

        let historyChart = null;

        async function loadHistory() {
            // Charger les 7 derniers jours d'historique
            const today = new Date();
            const history = [];

            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                try {
                    const response = await fetch(`data/history/${dateStr}.json`);
                    if (response.ok) {
                        const data = await response.json();
                        history.push({
                            date: dateStr,
                            total: data.stats?.total || 0,
                            avg_price: data.stats?.avg_price || 0
                        });
                    }
                } catch (e) {
                    // Fichier non trouvé, continuer
                }
            }
            return history;
        }

        async function init() {
            if(!LISTINGS) return;

            // Graphique prix par ville (existant)
            const cityPrices = {};
            LISTINGS.forEach(l => {
                if(!cityPrices[l.city]) cityPrices[l.city] = [];
                if(l.price > 0) cityPrices[l.city].push(l.price);
            });

            const topCities = Object.entries(cityPrices)
                .map(([city, prices]) => [city, Math.round(prices.reduce((a,b) => a+b, 0) / prices.length)])
                .sort((a,b) => b[1] - a[1])
                .slice(0, 5);

            const ctx = document.getElementById('priceChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: topCities.map(c => c[0]),
                    datasets: [{
                        label: 'Prix Moyen par Ville (€)',
                        data: topCities.map(c => c[1]),
                        backgroundColor: ['#667eea', '#764ba2', '#8b9cff', '#5a6fd6', '#36a2eb'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true } }
                }
            });

            // Charger historique et créer graphique tendances
            const history = await loadHistory();
            if (history.length > 1) {
                // Ajouter canvas pour historique
                const histContainer = document.createElement('div');
                histContainer.className = 'chart-container';
                histContainer.style.marginTop = '2rem';
                histContainer.innerHTML = '<canvas id="historyChart"></canvas>';
                document.querySelector('.chart-container').after(histContainer);

                const ctxHist = document.getElementById('historyChart').getContext('2d');
                historyChart = new Chart(ctxHist, {
                    type: 'line',
                    data: {
                        labels: history.map(h => h.date.slice(5)), // MM-DD
                        datasets: [{
                            label: 'Nombre d\'annonces',
                            data: history.map(h => h.total),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            fill: true,
                            tension: 0.3
                        }, {
                            label: 'Prix moyen (€)',
                            data: history.map(h => h.avg_price),
                            borderColor: '#28a745',
                            backgroundColor: 'rgba(40, 167, 69, 0.1)',
                            fill: true,
                            tension: 0.3,
                            yAxisID: 'y1'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: true } },
                        scales: {
                            y: { position: 'left', title: { display: true, text: 'Annonces' } },
                            y1: { position: 'right', title: { display: true, text: 'Prix (€)' }, grid: { drawOnChartArea: false } }
                        }
                    }
                });
            }

            document.getElementById('stats').innerHTML = `
                <p><strong>Total Annonces:</strong> ${LISTINGS.length}</p>
                <p><strong>Nombre de Villes:</strong> ${Object.keys(cityPrices).length}</p>
                <p><strong>Prix Moyen Global:</strong> ${Math.round(LISTINGS.filter(l => l.price > 0).map(l => l.price).reduce((a,b) => a+b, 0) / LISTINGS.filter(l => l.price > 0).length)}€</p>
                <p><strong>Historique chargé:</strong> ${history.length} jours</p>
            `;
        }

        init();
    </script>
<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("SW registered"))
        .catch(err => console.log("SW failed:", err));
}
</script>
</body>
</html>
