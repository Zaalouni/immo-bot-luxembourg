<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <title>Favoris & Alertes - ImmoLux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script src="dark-mode.js" defer></script>
</head>
<body>
    <div class="header">
        <h1>⭐ Favoris & Alertes</h1>
        <p style="margin: 0; opacity: 0.9;">Sauvegardez vos annonces préférées et recevez des alertes</p>
    </div>

    <div class="container-main">
        <div class="alert-control">
            <h3 style="color: var(--primary); margin-bottom: 1rem;">🔔 Configuration des Alertes</h3>
            <div class="row">
                <div class="col-md-6">
                    <label>Alerte si prix < (€):</label>
                    <input type="number" id="alertPrice" class="form-control form-control-sm" placeholder="1500">
                </div>
                <div class="col-md-6">
                    <label>Ville:</label>
                    <select id="alertCity" class="form-select form-select-sm"></select>
                </div>
            </div>
            <button class="btn btn-primary mt-2" onclick="setAlert()">💾 Sauvegarder Alerte</button>
        </div>

        <div style="background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;">
            <h3 style="color: var(--primary); margin-bottom: 1rem;">📋 Mes Alertes Sauvegardées</h3>
            <div id="savedAlerts"></div>
        </div>

        <div id="alertMatches" style="background: rgba(40, 167, 69, 0.1); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;"></div>

        <div>
            <h3 style="color: var(--primary); margin-bottom: 1rem;">⭐ Mes Favoris</h3>
            <div id="favoritesList"></div>
            <p id="noFavs" class="text-muted text-center" style="padding: 2rem;">Aucun favori sauvegardé. Cliquez sur ⭐ pour ajouter une annonce!</p>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="index.html" class="btn btn-primary">← Retour</a>
        </div>
    </div>

    <button class="dark-mode-toggle" id="darkModeToggle">🌙</button>

    <script src="data/listings.js"></script>
    <script>
        const dm = document.getElementById("darkModeToggle");
        dm.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("darkMode", document.body.classList.contains("dark-mode"));
        });
        if(localStorage.getItem("darkMode") === "true") document.body.classList.add("dark-mode");

        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

        function init() {
            const cities = [...new Set(LISTINGS.map(l => l.city))].sort();
            const select = document.getElementById('alertCity');
            cities.forEach(c => {
                select.innerHTML += `<option value="${c}">${c}</option>`;
            });
            renderFavorites();
        }

        function toggleFavorite(id) {
            const idx = favorites.indexOf(id);
            if(idx === -1) favorites.push(id);
            else favorites.splice(idx, 1);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            renderFavorites();
        }

        function renderFavorites() {
            const favListings = LISTINGS.filter(l => favorites.includes(l.listing_id));
            document.getElementById('noFavs').style.display = favListings.length ? 'none' : 'block';
            document.getElementById('favoritesList').innerHTML = favListings.map(l => `
                <div class="card-item">
                    <div>
                        <strong>${l.title.substring(0, 50)}</strong><br>
                        <small style="color: #888;">${l.city} • ${l.price.toLocaleString('fr-FR')}€ • ${l.site}</small>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn-action btn-fav" onclick="toggleFavorite('${l.listing_id}')">⭐ Favori</button>
                        <a href="${l.url}" target="_blank" class="btn-action" style="background: var(--primary); color: white;">Voir</a>
                    </div>
                </div>
            `).join('');
        }

        let alerts = JSON.parse(localStorage.getItem('priceAlerts') || '[]');

        function setAlert() {
            const price = document.getElementById('alertPrice').value;
            const city = document.getElementById('alertCity').value;
            if(price && city) {
                const newAlert = { id: Date.now(), price: parseInt(price), city: city };
                alerts.push(newAlert);
                localStorage.setItem('priceAlerts', JSON.stringify(alerts));
                document.getElementById('alertPrice').value = '';
                renderAlerts();
                checkAlerts();
            }
        }

        function removeAlert(id) {
            alerts = alerts.filter(a => a.id !== id);
            localStorage.setItem('priceAlerts', JSON.stringify(alerts));
            renderAlerts();
        }

        function renderAlerts() {
            const container = document.getElementById('savedAlerts');
            if (!alerts.length) {
                container.innerHTML = '<p class="text-muted text-center">Aucune alerte configurée</p>';
                return;
            }
            container.innerHTML = alerts.map(a => `
                <div class="card-item" style="display: flex; justify-content: space-between; align-items: center;">
                    <span>🔔 Prix &lt; <strong>${a.price}€</strong> à <strong>${a.city}</strong></span>
                    <button class="btn btn-sm btn-outline-danger" onclick="removeAlert(${a.id})">✕</button>
                </div>
            `).join('');
        }

        function checkAlerts() {
            const matchingListings = [];
            alerts.forEach(a => {
                LISTINGS.forEach(l => {
                    if (l.city === a.city && l.price > 0 && l.price < a.price) {
                        matchingListings.push({ alert: a, listing: l });
                    }
                });
            });
            if (matchingListings.length > 0) {
                const alertMatches = document.getElementById('alertMatches');
                alertMatches.innerHTML = '<h4 style="color: #28a745; margin-bottom: 1rem;">✅ Annonces correspondantes</h4>' +
                    matchingListings.slice(0, 5).map(m => `
                        <div class="card-item">
                            <div>
                                <strong>${m.listing.title.substring(0, 50)}</strong><br>
                                <small style="color: #888;">${m.listing.city} • ${m.listing.price.toLocaleString('fr-FR')}€ (alerte: &lt;${m.alert.price}€)</small>
                            </div>
                            <a href="${m.listing.url}" target="_blank" class="btn-action" style="background: var(--primary); color: white;">Voir</a>
                        </div>
                    `).join('');
            }
        }

        init();
        renderAlerts();
        checkAlerts();
    </script>
<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("SW registered"))
        .catch(err => console.log("SW failed:", err));
}
</script>
</body>
</html>
