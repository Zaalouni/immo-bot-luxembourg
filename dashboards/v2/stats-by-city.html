<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="../icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Statistiques immobilières par ville - ImmoLux">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="../manifest.json">
    <title>Stats par Ville - ImmoLux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles.css">
    <script src="../dark-mode.js" defer></script>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-content">
        <h1>📊 Statistiques par Ville</h1>
        <small id="lastUpdate">Mis à jour: 27/02/2026</small>
    </div>
</div>

<div class="container-main">

    <!-- Search -->
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Filtrer par ville (ex: Luxembourg, Esch...)" onkeyup="filterCities()">
        <div style="text-align: center; margin-top: 0.5rem; color: #666; font-size: 0.9rem;">
            <span id="cityCount"></span>
        </div>
    </div>

    <!-- Content: Annonces par Ville -->
    <div id="listingsByCityContainer" style="background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-radius: 12px; padding: 1rem;"></div>

</div>

<!-- Dark Mode Toggle -->
<button class="dark-mode-toggle" id="darkModeToggle" title="Mode sombre">🌙</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
<script src="data/listings.js"></script>
<script>
// Load transport data
let TRANSPORTS = {};
fetch('data/city-transports.json')
    .then(r => r.json())
    .then(data => {
        TRANSPORTS = data.cities || {};
        console.log('✅ Transports loaded:', Object.keys(TRANSPORTS).length, 'cities');
    })
    .catch(err => console.log('Transport data not available:', err));
</script>
<script>
    // ==================== DARK MODE ====================
    const darkModeToggle = document.getElementById('darkModeToggle');
    darkModeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    });

    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }

    // ==================== DATA PROCESSING ====================
    let allCities = [];
    let cityStats = {};

    function init() {
        if (!LISTINGS || LISTINGS.length === 0) {
            console.error('❌ LISTINGS not loaded');
            return;
        }

        document.getElementById('lastUpdate').textContent = `Mis à jour: ${new Date().toLocaleString('fr-FR')}`;

        // Group by city
        const byCity = {};
        LISTINGS.forEach(l => {
            const city = l.city || 'N/A';
            if (!byCity[city]) byCity[city] = [];
            byCity[city].push(l);
        });

        allCities = Object.keys(byCity).sort();

        // Calculate stats
        allCities.forEach(city => {
            const listings = byCity[city];
            const prices = listings.filter(l => l.price > 0).map(l => l.price);
            const surfaces = listings.filter(l => l.surface > 0).map(l => l.surface);
            const rooms = listings.filter(l => l.rooms > 0).map(l => l.rooms);

            const minPrice = prices.length ? Math.min(...prices) : 0;
            const maxPrice = prices.length ? Math.max(...prices) : 0;
            const avgPrice = prices.length ? Math.round(prices.reduce((a, b) => a + b, 0) / prices.length) : 0;
            const avgSurface = surfaces.length ? Math.round(surfaces.reduce((a, b) => a + b, 0) / surfaces.length) : 0;
            const avgRooms = rooms.length ? (rooms.reduce((a, b) => a + b, 0) / rooms.length).toFixed(1) : 0;

            cityStats[city] = {
                count: listings.length,
                minPrice,
                maxPrice,
                avgPrice,
                avgSurface,
                avgRooms,
                listings: listings
            };
        });

        // Render listings by city after a short delay to ensure transports are loaded
        setTimeout(() => renderListingsByCity(), 500);
    }

    function filterCities() {
        renderListingsByCity();
    }

    function renderListingsByCity() {
        const container = document.getElementById('listingsByCityContainer');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const byCity = {};

        LISTINGS.forEach(l => {
            const city = l.city || 'N/A';
            if (!byCity[city]) byCity[city] = [];
            byCity[city].push(l);
        });

        const cities = Object.keys(byCity).sort();

        // Filter cities based on search term
        const filteredCities = cities.filter(city =>
            city.toLowerCase().includes(searchTerm)
        );

        // Update city count
        const totalListings = filteredCities.reduce((sum, city) => sum + byCity[city].length, 0);
        document.getElementById('cityCount').textContent =
            `📊 ${filteredCities.length} villes • ${totalListings} annonces`;

        let html = '';

        filteredCities.forEach((city, idx) => {
            const listings = byCity[city];
            const transport = TRANSPORTS[city] || {};
            const transportList = transport.transports || [];

            html += `
                <div class="accordion" id="accordion-${idx}">
                    <div class="accordion-item" style="background: rgba(255,255,255,0.7); border: 1px solid rgba(0,0,0,0.1); margin-bottom: 0.5rem; border-radius: 10px;">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#city-${idx}">
                                <strong style="color: var(--primary); margin-right: 1rem;">📍 ${city}</strong>
                                <span style="background: #667eea; color: white; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.85rem; margin-right: 1rem;">${listings.length} annonces</span>
                                <span style="color: #666; font-size: 0.9rem;">
                                    ${transportList.length > 0 ?
                                        transportList.map(t => {
                                            const icon = t.type === 'gare' ? '🚉' :
                                                        t.type === 'train' ? '🚂' :
                                                        t.type === 'bus' ? '🚌' :
                                                        t.type === 'tram' ? '🚊' :
                                                        t.type === 'pied' ? '🚶' : '🚇';
                                            return `${icon} ${t.number}`;
                                        }).join(' • ')
                                        : '⚠️ Transports non disponibles'}
                                </span>
                            </button>
                        </h2>
                        <div id="city-${idx}" class="accordion-collapse collapse" data-bs-parent="#accordion-${idx}">
                            <div class="accordion-body" style="padding: 1rem; background: rgba(255,255,255,0.5);">
                                ${transportList.length > 0 ? `
                                    <div style="background: #e8f4f8; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid #667eea;">
                                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                            <strong>🚊 Moyens de transport vers Gare Centrale</strong>
                                            ${transport.distance_km != null ? `<span style="color: #666; font-size: 0.9rem;">📏 ${transport.distance_km} km${transport.region ? ` • ${transport.region}` : ''}</span>` : ''}
                                        </div>
                                        ${transportList.map(t => {
                                            const icon = t.type === 'gare' ? '🚉' :
                                                        t.type === 'train' ? '🚂' :
                                                        t.type === 'bus' ? '🚌' :
                                                        t.type === 'tram' ? '🚊' :
                                                        t.type === 'pied' ? '🚶' : '🚇';
                                            return `
                                            <div style="margin-top: 0.5rem;">
                                                ${icon}
                                                <strong>${t.number}</strong> - ${t.description}
                                                <span style="color: #666;">(${t.duration_min} min)</span>
                                            </div>
                                            `;
                                        }).join('')}
                                    </div>
                                ` : ''}
                                <table class="table table-sm mb-0">
                                    <thead style="background: #f5f5f5;">
                                        <tr>
                                            <th>Titre</th>
                                            <th>Prix</th>
                                            <th>Chambres</th>
                                            <th>Surface</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${listings.map(l => `
                                            <tr>
                                                <td><small><strong>${l.title.substring(0, 35)}</strong></small></td>
                                                <td><strong>${l.price.toLocaleString('fr-FR')}€</strong></td>
                                                <td>${l.rooms}</td>
                                                <td>${l.surface}m²</td>
                                                <td><a href="${l.url}" target="_blank" class="btn btn-xs btn-primary" style="padding: 0.2rem 0.5rem; font-size: 0.75rem;">Voir</a></td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // ==================== SERVICE WORKER ====================
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed'));
    }

    // ==================== INIT ====================
    init();
</script>
</body>
</html>
