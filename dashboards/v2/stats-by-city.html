<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <!-- Version -->
    <meta name="version" content="v2.0.0-beta">
    <meta name="updated" content="2026-03-05">

    <!-- Viewport & Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">

    <!-- SEO Meta Tags -->
    <title>Statistiques par Ville - Annonces Immobilières Luxembourg | ImmoLux</title>
    <meta name="description" content="Statistiques détaillées des annonces immobilières par ville au Luxembourg. Prix moyen, surface, transports et filtrage par ville.">
    <meta name="keywords" content="statistiques immobilier, prix par ville, luxembourg, annonces par ville">
    <meta name="robots" content="index, follow">
    <meta name="language" content="fr-LU">

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="../icon.svg">
    <link rel="apple-touch-icon" href="../icon.svg">

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">

    <!-- PWA Manifest -->
    <link rel="manifest" href="../manifest.json">

    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="stats-by-city.css">

    <!-- Defer dark-mode script -->
    <script src="../dark-mode.js" defer></script>

    <style>
        /* Prevent FOUC */
        html {
            visibility: hidden;
        }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="top-nav" role="navigation" aria-label="Navigation principale">
    <a href="index.html" class="back-btn" title="Retour au dashboard" aria-label="Retour au tableau principal">← Dashboard</a>
    <span class="nav-title">📊 Statistiques par Ville</span>
    <span class="nav-upd" id="nav-upd" aria-live="polite">Mis à jour : —</span>
</nav>

<!-- Main Content -->
<div class="container-stats">
    <!-- Search & Filter -->
    <div class="search-section">
        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                class="form-control form-control-lg"
                placeholder="🔍 Filtrer par ville (ex: Luxembourg, Esch...)"
                onkeyup="filterCities()"
                aria-label="Filtrer les villes">
        </div>
        <div class="stats-summary">
            <span id="cityCount">—</span>
        </div>
    </div>

    <!-- Quick Stats -->
    <div class="quick-stats" id="quickStats"></div>

    <!-- Cities List -->
    <div id="listingsByCityContainer" class="cities-container" role="region" aria-label="Statistiques par ville"></div>
</div>

<!-- Dark Mode Toggle -->
<button class="dark-mode-toggle" id="darkModeToggle" title="Mode sombre/clair" aria-label="Basculer le mode sombre" aria-pressed="false">🌙</button>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous" defer></script>
<script src="data/listings.js" defer></script>
<script src="stats-by-city.js" defer></script>

<!-- Version Switcher -->
<script src="../version-switcher.js" defer></script>

<script>
    // Restore visibility after fonts loaded
    document.addEventListener('DOMContentLoaded', () => {
        document.documentElement.style.visibility = 'visible';
    });
</script>

</body>
</html>
