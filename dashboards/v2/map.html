<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <!-- Version -->
    <meta name="version" content="v2.0.0-beta">
    <meta name="updated" content="2026-03-05">

    <!-- Viewport & Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">

    <!-- SEO Meta Tags -->
    <title>ImmoLux Carte Interactive - Annonces Immobilières Luxembourg | Géolocalisation</title>
    <meta name="description" content="Carte interactive des annonces immobilières au Luxembourg. Visualisez les propriétés sur la carte avec MarkerCluster, filtres avancés et statistiques géolocalisées.">
    <meta name="keywords" content="carte immobilier, luxembourg, annonces, géolocalisation, markercluster">
    <meta name="robots" content="index, follow">
    <meta name="language" content="fr-LU">

    <!-- OpenGraph Tags -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://immo-bot-luxembourg.example.com/dashboards/v2/map.html">
    <meta property="og:title" content="ImmoLux - Carte Interactive des Annonces">
    <meta property="og:description" content="Explorez les propriétés immobilières sur une carte interactive du Luxembourg avec clustering automatique.">
    <meta property="og:image" content="https://immo-bot-luxembourg.example.com/og-image.png">

    <!-- Twitter Card Tags -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="ImmoLux Carte Immobilier">
    <meta property="twitter:description" content="Visualisez les annonces immobilières sur une carte interactive.">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://immo-bot-luxembourg.example.com/dashboards/v2/map.html">

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <!-- CSP without unsafe-inline -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:; frame-ancestors 'none';">

    <!-- PWA Manifest -->
    <link rel="manifest" href="../manifest.json">

    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
    <link href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" rel="stylesheet">
    <link href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">

    <!-- Map-specific styles (external) -->
    <link rel="stylesheet" href="map.css">

    <!-- Defer dark-mode script -->
    <script src="../dark-mode.js" defer></script>

    <style>
        /* Prevent FOUC */
        html {
            visibility: hidden;
        }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="top-nav" role="navigation" aria-label="Navigation principale">
    <a href="index.html" class="back-btn" title="Retour au dashboard" aria-label="Retour au tableau principal">← Dashboard</a>
    <span class="nav-title">🗺️ Carte des annonces</span>
    <span class="nav-upd" id="nav-upd" aria-live="polite">Mis à jour : —</span>
</nav>

<!-- Map Container -->
<div id="map" role="application" aria-label="Carte interactive des annonces immobilières avec MarkerCluster"></div>

<!-- Control Panel -->
<aside id="panel" role="complementary" aria-label="Panneau de contrôle des filtres">
    <div class="ph" onclick="togglePanel()" role="button" tabindex="0" aria-expanded="true" aria-controls="panel-content" title="Ouvrir/fermer le panneau">
        <span>Annonces géolocalisées</span>
        <div style="display:flex;align-items:center;gap:.4rem">
            <span class="badge-geo" id="geo-count" aria-label="Nombre d'annonces géolocalisées">103</span>
            <span class="toggle-icon" aria-hidden="true">▲</span>
        </div>
    </div>
    <div class="pb" id="panel-content" role="region" aria-label="Contenu du panneau">
        <!-- Stats rapides -->
        <div class="qs">
            <div class="qs-item">
                <div class="qs-val" id="stats-total">114</div>
                <div class="qs-lbl">Total</div>
            </div>
            <div class="qs-item">
                <div class="qs-val" id="stats-avg">2187€</div>
                <div class="qs-lbl">Moyenne</div>
            </div>
        </div>

        <!-- Filtres -->
        <div style="margin-bottom: 0.8rem;">
            <label for="filter-city" class="filter-lbl">Ville</label>
            <select id="filter-city" class="form-select form-select-sm" aria-label="Filtrer par ville">
                <option value="">Toutes</option>
            </select>
        </div>

        <div style="margin-bottom: 0.8rem;">
            <label for="filter-site" class="filter-lbl">Site</label>
            <select id="filter-site" class="form-select form-select-sm" aria-label="Filtrer par site">
                <option value="">Tous</option>
            </select>
        </div>

        <div style="margin-bottom: 0.8rem;">
            <label for="filter-price-min" class="filter-lbl">Prix Min</label>
            <input type="number" id="filter-price-min" class="form-control form-control-sm" placeholder="0" aria-label="Prix minimum">
        </div>

        <div style="margin-bottom: 0.8rem;">
            <label for="filter-price-max" class="filter-lbl">Prix Max</label>
            <input type="number" id="filter-price-max" class="form-control form-control-sm" placeholder="999999" aria-label="Prix maximum">
        </div>

        <button class="btn btn-sm btn-outline-secondary w-100 mb-2" onclick="resetFilters()" aria-label="Réinitialiser tous les filtres">Reset</button>

        <!-- Légende -->
        <div style="border-top: 1px solid #e2e8f0; padding-top: 0.6rem; margin-top: 0.8rem;">
            <div class="filter-lbl">Légende</div>
            <div id="legend" role="region" aria-label="Légende des couleurs sites"></div>
        </div>
    </div>
</aside>

<!-- Dark Mode Toggle -->
<button class="dark-mode-toggle" id="darkModeToggle" title="Mode sombre/clair" aria-label="Basculer le mode sombre" aria-pressed="false">🌙</button>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9OjPSpiJWesXJsfalOQfa4nLELqNSn86yJIBAM3nUmWCe4r4p4K4msC" crossorigin="anonymous" defer></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous" defer></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" defer></script>
<script src="../data/listings.js" defer></script>
<script src="map.js" defer></script>

<!-- Version Switcher -->
<script src="../version-switcher.js" defer></script>

<script>
    // Restore visibility after fonts loaded
    document.addEventListener('DOMContentLoaded', () => {
        document.documentElement.style.visibility = 'visible';
    });
</script>

</body>
</html>
