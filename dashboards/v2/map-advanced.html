<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <!-- Version -->
    <meta name="version" content="v2.0.0-beta">
    <meta name="updated" content="2026-03-05">

    <!-- Viewport & Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">

    <!-- SEO Meta Tags -->
    <title>Carte Avancée - Annonces Immobilières Luxembourg | ImmoLux</title>
    <meta name="description" content="Carte avancée avec filtres par ville et site. Visualisez toutes les annonces immobilières au Luxembourg avec clustering intelligent.">
    <meta name="keywords" content="carte avancée, immobilier, luxembourg, annonces, filtres">
    <meta name="robots" content="index, follow">
    <meta name="language" content="fr-LU">

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="../icon.svg">
    <link rel="apple-touch-icon" href="../icon.svg">

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">

    <!-- PWA Manifest -->
    <link rel="manifest" href="../manifest.json">

    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
    <link href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" rel="stylesheet">
    <link href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">

    <!-- Map-advanced specific styles -->
    <link rel="stylesheet" href="map-advanced.css">

    <!-- Defer dark-mode script -->
    <script src="../dark-mode.js" defer></script>

    <style>
        /* Prevent FOUC */
        html {
            visibility: hidden;
        }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="top-nav" role="navigation" aria-label="Navigation principale">
    <a href="index.html" class="back-btn" title="Retour au dashboard" aria-label="Retour au tableau principal">← Dashboard</a>
    <span class="nav-title">🗺️ Carte Avancée</span>
    <span class="nav-upd" id="nav-upd" aria-live="polite">Mis à jour : —</span>
</nav>

<!-- Main Layout -->
<div class="container-advanced-map">
    <!-- Sidebar with Filters -->
    <aside class="sidebar-advanced" role="complementary" aria-label="Panneau de filtres et liste">
        <!-- Filter Panel -->
        <div class="filter-section">
            <h5 class="filter-title">🔍 Filtres</h5>

            <div class="filter-group">
                <label for="filterCity" class="form-label">Ville</label>
                <select id="filterCity" class="form-select form-select-sm" aria-label="Filtrer par ville">
                    <option value="">Toutes les villes</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterSite" class="form-label">Site</label>
                <select id="filterSite" class="form-select form-select-sm" aria-label="Filtrer par site">
                    <option value="">Tous les sites</option>
                </select>
            </div>

            <button class="btn btn-primary w-100" onclick="applyMapFilters()" aria-label="Appliquer les filtres">
                Appliquer
            </button>
            <button class="btn btn-secondary w-100 mt-2" onclick="resetFilters()" aria-label="Réinitialiser les filtres">
                Réinitialiser
            </button>
        </div>

        <!-- Listings Panel -->
        <div class="listings-section">
            <h5 class="listings-title">📋 Annonces</h5>
            <div id="listings" class="listings-container" role="region" aria-label="Liste des annonces"></div>
        </div>
    </aside>

    <!-- Map Container -->
    <div id="map" class="map-container" role="application" aria-label="Carte interactive des annonces avancée"></div>
</div>

<!-- Dark Mode Toggle -->
<button class="dark-mode-toggle" id="darkModeToggle" title="Mode sombre/clair" aria-label="Basculer le mode sombre" aria-pressed="false">🌙</button>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous" defer></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous" defer></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" defer></script>
<script src="data/listings.js" defer></script>
<script src="data/anomalies.js" defer></script>
<script src="map-advanced.js" defer></script>

<!-- Version Switcher -->
<script src="../version-switcher.js" defer></script>

<script>
    // Restore visibility after fonts loaded
    document.addEventListener('DOMContentLoaded', () => {
        document.documentElement.style.visibility = 'visible';
    });
</script>

</body>
</html>
