<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="../icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autour de Moi - ImmoLux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles.css">
    <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ImmoLux">
    <script src="../dark-mode.js" defer></script>
</head>
<body>
    <div class="header">
        <h1>📍 Autour de Moi - ImmoLux</h1>
        <div style="margin-top: 0.8rem;">
            <a href="index.html" class="nav-link">📊 Dashboard</a>
            <a href="new-listings.html" class="nav-link">⭐ New Offres</a>
            <a href="anomalies.html" class="nav-link">🎯 Anomalies</a>
            <a href="map-advanced.html" class="nav-link">🗺️ Carte+</a>
            <a href="nearby.html" class="nav-link active">📍 Proche</a>
        </div>
    </div>

    <div class="container-fluid p-3">
        <!-- Status message -->
        <div id="status" class="status"></div>

        <!-- Location controls -->
        <div class="location-box">
            <h5>Localisation</h5>
            <button class="location-button" onclick="getLocation()">📍 Localiser</button>
            <div id="locationInfo" class="text-muted small"></div>

            <div class="mt-3">
                <label>Rayon de recherche: <strong id="radiusValue">2 km</strong></label><br/>
                <input type="range" id="radiusSlider" min="0.5" max="10" step="0.5" value="2"
                       onchange="updateRadius()" style="width:100%; max-width:300px;">
            </div>
        </div>

        <!-- Stats -->
        <div class="row g-2 mb-3" id="statsContainer">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="countNearby">0</div>
                    <div class="stat-label">Annonces Proches</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="avgPriceNearby">0€</div>
                    <div class="stat-label">Prix Moyen</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="minDistance">0 km</div>
                    <div class="stat-label">Plus Proche</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="maxDistance">0 km</div>
                    <div class="stat-label">Plus Loin</div>
                </div>
            </div>
        </div>

        <!-- Map -->
        <div id="map"></div>

        <!-- Listings nearby -->
        <div id="listings"></div>
    </div>

    <!-- Dark Mode Toggle -->
    <button class="dark-mode-toggle" aria-label="Mode sombre/clair" aria-pressed="false" id="darkModeToggle" title="Mode sombre">🌙</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
    <script src="data/listings.js"></script>
    <script src="data/anomalies.js"></script>
    <script>
        // Fallback si ANOMALIES n'est pas chargé
        if (typeof ANOMALIES === 'undefined') {
            window.ANOMALIES = {};
        }

        let map;
        let userLocation = null;
        let userMarker = null;
        let nearbyListings = [];
        let currentRadius = 2; // km

        // Haversine distance calculation
        function haversineDistance(lat1, lng1, lat2, lng2) {
            const R = 6371; // Earth radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function showStatus(msg, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status ' + type;
        }

        function getLocation() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Localisation...';

            navigator.geolocation.getCurrentPosition(
                position => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    showStatus('✅ Position trouvée', 'success');
                    document.getElementById('locationInfo').innerHTML =
                        `Lat: ${userLocation.lat.toFixed(4)}, Lng: ${userLocation.lng.toFixed(4)}`;
                    btn.textContent = '📍 Localiser';
                    btn.disabled = false;
                    renderNearby();
                },
                error => {
                    showStatus('❌ Erreur: ' + error.message, 'error');
                    btn.textContent = '📍 Localiser';
                    btn.disabled = false;
                }
            );
        }

        function updateRadius() {
            currentRadius = parseFloat(document.getElementById('radiusSlider').value);
            document.getElementById('radiusValue').textContent = currentRadius + ' km';
            if (userLocation) renderNearby();
        }

        function renderNearby() {
            if (!userLocation) {
                showStatus('⚠️ Veuillez d\'abord localiser votre position', 'info');
                return;
            }

            // Filter listings within radius
            nearbyListings = LISTINGS
                .filter(l => l.latitude && l.longitude)
                .map(l => ({
                    ...l,
                    distance: haversineDistance(userLocation.lat, userLocation.lng, l.latitude, l.longitude)
                }))
                .filter(l => l.distance <= currentRadius)
                .sort((a, b) => a.distance - b.distance);

            if (nearbyListings.length === 0) {
                document.getElementById('listings').innerHTML = '<div class="alert alert-info">Aucune annonce trouvée dans le rayon défini</div>';
                document.getElementById('statsContainer').style.display = 'none';
                return;
            }

            // Update stats
            const prices = nearbyListings.map(l => l.price);
            const distances = nearbyListings.map(l => l.distance);

            document.getElementById('countNearby').textContent = nearbyListings.length;
            document.getElementById('avgPriceNearby').textContent = Math.round(prices.reduce((a, b) => a + b) / prices.length) + '€';
            document.getElementById('minDistance').textContent = Math.min(...distances).toFixed(1) + ' km';
            document.getElementById('maxDistance').textContent = Math.max(...distances).toFixed(1) + ' km';
            document.getElementById('statsContainer').style.display = 'grid';

            renderMap();
            renderListings();
        }

        function renderMap() {
            if (!map) {
                map = L.map('map').setView([userLocation.lat, userLocation.lng], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);
            } else {
                map.setView([userLocation.lat, userLocation.lng], 12);
            }

            // Clear existing markers
            map.eachLayer(layer => {
                if (layer instanceof L.CircleMarker || layer instanceof L.Marker) {
                    map.removeLayer(layer);
                }
            });

            // User position
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker([userLocation.lat, userLocation.lng], {
                radius: 10,
                fillColor: '#667eea',
                color: '#fff',
                weight: 3,
                opacity: 1,
                fillOpacity: 0.8
            }).bindPopup('Votre position').addTo(map);

            // Search radius circle
            L.circle([userLocation.lat, userLocation.lng], {
                radius: currentRadius * 1000,
                color: '#667eea',
                fill: false,
                weight: 2,
                dashArray: '5, 5',
                opacity: 0.5
            }).addTo(map);

            // Nearby listings
            nearbyListings.forEach(listing => {
                const color = ANOMALIES[listing.listing_id] === 'GOOD_DEAL' ? '#28a745' :
                              ANOMALIES[listing.listing_id] === 'HIGH' ? '#dc3545' : '#ff9800';

                L.circleMarker([listing.latitude, listing.longitude], {
                    radius: 6,
                    fillColor: color,
                    color: '#fff',
                    weight: 2,
                    opacity: 0.8,
                    fillOpacity: 0.7
                }).bindPopup(`
                    <strong>${listing.title}</strong><br/>
                    ${listing.price}€ | ${listing.distance.toFixed(1)} km<br/>
                    <small>${listing.city}</small><br/>
                    <a href="${listing.url}" target="_blank" class="btn btn-sm btn-primary mt-2">Voir</a>
                `).addTo(map);
            });
        }

        function renderListings() {
            const container = document.getElementById('listings');
            container.innerHTML = nearbyListings.map(l => {
                const anomaly = ANOMALIES[l.listing_id];
                const badgeClass = anomaly === 'GOOD_DEAL' ? 'badge-success' : anomaly === 'HIGH' ? 'badge-danger' : 'badge-warning';

                return `
                    <div class="listing-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="mb-1">${l.title}</h6>
                                <div class="mb-2">
                                    <strong style="font-size:1.1rem; color:var(--primary);">${l.price}€</strong>
                                    ${anomaly ? `<span class="badge ${badgeClass}" style="margin-left:0.5rem;">${anomaly}</span>` : ''}
                                </div>
                                <small class="text-muted d-block">
                                    ${l.rooms > 0 ? l.rooms + ' ch | ' : ''}
                                    ${l.surface > 0 ? l.surface + 'm² | ' : ''}
                                    ${l.time_ago}
                                </small>
                            </div>
                            <div class="distance-badge">
                                📍 ${l.distance.toFixed(1)} km
                            </div>
                        </div>
                        <small class="badge bg-secondary">${l.city}</small>
                        <a href="${l.url}" target="_blank" class="btn btn-sm btn-primary mt-2">Voir l'annonce</a>
                    </div>
                `;
            }).join('');
        }

        // ==================== DARK MODE ====================
        const darkModeToggle = document.getElementById('darkModeToggle');
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        });

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        document.addEventListener('DOMContentLoaded', () => {
            showStatus('ℹ️ Cliquez sur "Localiser" pour démarrer', 'info');
        });
    </script>
<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("SW registered"))
        .catch(err => console.log("SW failed:", err));
}
</script>
<script src="../version-switcher.js" defer></script>
</body>
</html>
