<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="../icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="../manifest.json">
    <title>Comparateur - ImmoLux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles.css">
    <script src="../dark-mode.js" defer></script>
</head>
<body>
    <div class="header">
        <h1>🔄 Comparateur de Villes</h1>
        <p style="margin: 0; opacity: 0.9;">Comparez les prix et statistiques par ville</p>
    </div>

    <div class="container-main">
        <div class="controls">
            <div class="row">
                <div class="col-md-6">
                    <label>Ville 1:</label>
                    <select id="city1" class="form-select form-select-sm" onchange="compare()"></select>
                </div>
                <div class="col-md-6">
                    <label>Ville 2:</label>
                    <select id="city2" class="form-select form-select-sm" onchange="compare()"></select>
                </div>
            </div>
        </div>

        <div class="comparison-table">
            <table class="table">
                <thead>
                    <tr>
                        <th>Métrique</th>
                        <th id="h1">—</th>
                        <th id="h2">—</th>
                        <th>Différence</th>
                    </tr>
                </thead>
                <tbody id="compBody"></tbody>
            </table>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="index.html" class="btn btn-primary">← Retour</a>
        </div>
    </div>

    <button class="dark-mode-toggle" aria-label="Mode sombre/clair" aria-pressed="false" id="darkModeToggle">🌙</button>

    <script src="data/listings.js"></script>
    <script>
        const dm = document.getElementById("darkModeToggle");
        dm.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("darkMode", document.body.classList.contains("dark-mode"));
        });
        if(localStorage.getItem("darkMode") === "true") document.body.classList.add("dark-mode");

        function init() {
            const cities = [...new Set(LISTINGS.map(l => l.city))].sort();
            const s1 = document.getElementById('city1');
            const s2 = document.getElementById('city2');
            cities.forEach(c => {
                s1.innerHTML += `<option value="${c}">${c}</option>`;
                s2.innerHTML += `<option value="${c}">${c}</option>`;
            });
            if(cities.length > 1) {
                s1.value = cities[0];
                s2.value = cities[1];
                compare();
            }
        }

        function compare() {
            const c1 = document.getElementById('city1').value;
            const c2 = document.getElementById('city2').value;
            if(!c1 || !c2) return;

            document.getElementById('h1').textContent = c1;
            document.getElementById('h2').textContent = c2;

            const l1 = LISTINGS.filter(l => l.city === c1);
            const l2 = LISTINGS.filter(l => l.city === c2);

            const getAvg = (arr, field) => {
                const vals = arr.filter(l => l[field] > 0).map(l => l[field]);
                return vals.length ? Math.round(vals.reduce((a,b) => a+b) / vals.length) : 0;
            };

            // Fonction pour calculer la différence en %
            const calcDiff = (v1, v2) => {
                const n1 = parseInt(String(v1).replace(/[^\d]/g, '')) || 0;
                const n2 = parseInt(String(v2).replace(/[^\d]/g, '')) || 0;
                if (n2 === 0) return '—';
                const pct = Math.round((n1 - n2) / n2 * 100);
                if (pct > 0) return `<span style="color: #dc3545;">+${pct}%</span>`;
                if (pct < 0) return `<span style="color: #28a745;">${pct}%</span>`;
                return '=';
            };

            const avg1 = getAvg(l1, 'price');
            const avg2 = getAvg(l2, 'price');
            const min1 = l1.length ? Math.min(...l1.map(l => l.price)) : 0;
            const min2 = l2.length ? Math.min(...l2.map(l => l.price)) : 0;
            const max1 = l1.length ? Math.max(...l1.map(l => l.price)) : 0;
            const max2 = l2.length ? Math.max(...l2.map(l => l.price)) : 0;
            const surf1 = getAvg(l1, 'surface');
            const surf2 = getAvg(l2, 'surface');

            const data = [
                ['Annonces', l1.length, l2.length, calcDiff(l1.length, l2.length)],
                ['Prix Moyen', avg1 + '€', avg2 + '€', calcDiff(avg1, avg2)],
                ['Min', min1 + '€', min2 + '€', calcDiff(min1, min2)],
                ['Max', max1 + '€', max2 + '€', calcDiff(max1, max2)],
                ['Surface Avg', surf1 + 'm²', surf2 + 'm²', calcDiff(surf1, surf2)],
            ];

            document.getElementById('compBody').innerHTML = data.map(row => `
                <tr>
                    <td><strong>${row[0]}</strong></td>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td style="font-size: 0.9rem;">${row[3]}</td>
                </tr>
            `).join('');
        }

        init();
    </script>
<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("SW registered"))
        .catch(err => console.log("SW failed:", err));
}
</script>
<script src="../version-switcher.js" defer></script>
</body>
</html>
