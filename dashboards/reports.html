<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:;">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <title>Reports - ImmoLux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script src="dark-mode.js" defer></script>
    <script src="data/version.js"></script>
    <script src="version-display.js" defer></script>
</head>
<body>
    <div class="header">
        <h1>📄 Reports & Export</h1>
        <p style="margin: 0; opacity: 0.9;">Téléchargez vos données et rapports</p>
    </div>

    <div class="container-main">
        <div class="report-card">
            <h3 style="color: var(--primary); margin-bottom: 1rem;">📊 Rapport Marché Global</h3>
            <p>Exportez un rapport complet sur le marché immobilier avec toutes les statistiques.</p>
            <button class="btn-export" onclick="exportCSV()">📥 Exporter en CSV</button>
        </div>

        <div class="report-card">
            <h3 style="color: var(--primary); margin-bottom: 1rem;">📋 Export JSON</h3>
            <p>Exportez toutes les annonces au format JSON pour traitement externe.</p>
            <button class="btn-export" onclick="exportJSON()">📥 Exporter en JSON</button>
        </div>

        <div class="report-card">
            <h3 style="color: var(--primary); margin-bottom: 1rem;">🔍 Filtre Personnalisé</h3>
            <div style="margin-bottom: 1rem;">
                <label>Prix Min (€):</label>
                <input type="number" id="priceMin" class="form-control form-control-sm" placeholder="0">
                <label style="margin-top: 0.5rem;">Prix Max (€):</label>
                <input type="number" id="priceMax" class="form-control form-control-sm" placeholder="9999">
            </div>
            <button class="btn-export" onclick="exportFiltered()">📥 Exporter Filtré</button>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="index.html" class="btn btn-primary">← Retour</a>
        </div>
    </div>

    <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Mode sombre/clair" aria-pressed="false">🌙</button>

    <script src="data/listings.js"></script>
    <script>
        const dm = document.getElementById("darkModeToggle");
        dm.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("darkMode", document.body.classList.contains("dark-mode"));
        });
        if(localStorage.getItem("darkMode") === "true") document.body.classList.add("dark-mode");

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
        }

        function exportCSV() {
            let csv = 'Site,Titre,Ville,Prix,Chambres,Surface,€/m²,URL\n';
            LISTINGS.forEach(l => {
                csv += `"${l.site}","${l.title}","${l.city}",${l.price},${l.rooms},${l.surface},${l.price_m2},"${l.url}"\n`;
            });
            downloadFile(csv, `ImmoLux-${new Date().toISOString().split('T')[0]}.csv`, 'text/csv');
        }

        function exportJSON() {
            const json = JSON.stringify(LISTINGS, null, 2);
            downloadFile(json, `ImmoLux-${new Date().toISOString().split('T')[0]}.json`, 'application/json');
        }

        function exportFiltered() {
            const min = parseInt(document.getElementById('priceMin').value) || 0;
            const max = parseInt(document.getElementById('priceMax').value) || 999999;
            const filtered = LISTINGS.filter(l => l.price >= min && l.price <= max);
            let csv = 'Site,Titre,Ville,Prix,Chambres,Surface,URL\n';
            filtered.forEach(l => {
                csv += `"${l.site}","${l.title}","${l.city}",${l.price},${l.rooms},${l.surface},"${l.url}"\n`;
            });
            downloadFile(csv, `ImmoLux-Filtered-${new Date().toISOString().split('T')[0]}.csv`, 'text/csv');
        }
    </script>
<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("SW registered"))
        .catch(err => console.log("SW failed:", err));
}
</script>
</body>
</html>
